name: release

on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04    # oldest base with WebKitGTK 4.1 -> portable .deb/.rpm/.AppImage
          - platform: windows-latest  # NSIS .exe + MSI
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # tauri-action runs `pnpm build` (beforeBuildCommand) + the release build,
      # bundles every installer in bundle.targets, and uploads them to a single
      # GitHub Release for this tag. @v1 does not exist — use @v0 (or pin @v0.6.2).
      # Pull the section for this tag's version out of CHANGELOG.md (written by
      # the /release command) and use it as the Release body. Runs identically on
      # ubuntu and windows; on a workflow_dispatch with no matching section it
      # falls back to the download line alone. github-script@v8 -> Node 24.
      - name: Compose release notes from CHANGELOG.md
        id: notes
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const version = context.ref.replace(/^refs\/tags\/app-v/, '');
            const footer = "Téléchargez l'installeur correspondant à votre système ci-dessous.";
            let section = '';
            try {
              const lines = fs.readFileSync('CHANGELOG.md', 'utf8').split('\n');
              const start = lines.findIndex((l) => l.startsWith(`## [${version}]`));
              if (start !== -1) {
                let end = lines.findIndex((l, i) => i > start && l.startsWith('## ['));
                if (end === -1) end = lines.length;
                section = lines.slice(start + 1, end).join('\n').trim();
              } else {
                core.warning(`No CHANGELOG.md section for ${version}; using the footer alone.`);
              }
            } catch (err) {
              core.warning(`Could not read CHANGELOG.md: ${err.message}`);
            }
            core.setOutput('body', section ? `${section}\n\n---\n\n${footer}` : footer);

      - name: Build and create draft Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (minisign). Set these as repository secrets — without
          # them no .sig is produced and clients reject the update. See docs/adr.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'Gitting v__VERSION__'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          # Both NSIS .exe and MSI are built; point the updater manifest at NSIS.
          updaterJsonPreferNsis: true
